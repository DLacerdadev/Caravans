<!DOCTYPE html>
<html lang="pt-BR" data-mode="safe">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>document.documentElement.classList.add('is-entering');</script>
  <title>Detalhes da campanha · Sobrevivendo ao Horror</title>
  <link rel="stylesheet" href="../styles/reset.css" />
  <link rel="stylesheet" href="../styles/tokens.css" />
  <link rel="stylesheet" href="../styles/layout.css" />
  <link rel="stylesheet" href="../styles/components.css" />
  <link rel="stylesheet" href="../styles/responsive.css" />
</head>
<body>
  <div class="atmos atmos-safe"></div>
  <div class="atmos atmos-mission"></div>

  <div class="shell">
    <header class="appbar">
      <a class="wordmark" href="campanhas.html">Sobrevivendo ao <b>Horror</b></a>
      <span class="mode-chip"><span class="led"></span> Zona Segura · Campanha</span>
    </header>

    <main>
      <a class="btn btn--muted btn--sm" href="campanhas.html" style="margin-bottom:18px">← Voltar às campanhas</a>

      <p class="eyebrow" data-field="era">—</p>
      <h1 class="page-title" data-field="name">Campanha</h1>
      <div class="row" style="margin:-4px 0 18px">
        <span class="risk" data-field="status">—</span>
      </div>
      <p class="page-sub" data-field="synopsis" style="max-width:64ch">—</p>

      <div class="detail-layout">
        <!-- Coluna principal -->
        <div class="stack" style="gap:var(--sp-5)">
          <section class="card">
            <h2 class="section-title">O grupo</h2>
            <div class="crew" data-field="crew"><!-- via JS --></div>
          </section>

          <section class="card">
            <h2 class="section-title">Organizações conhecidas</h2>
            <div data-field="orgs"><!-- via JS --></div>
          </section>

          <section class="card">
            <h2 class="section-title">Diário de sessões</h2>
            <div class="timeline" data-field="log"><!-- via JS --></div>
          </section>
        </div>

        <!-- Coluna lateral: panorama + ação -->
        <aside class="stack" style="gap:var(--sp-4)">
          <section class="card">
            <h2 class="section-title">Panorama</h2>
            <div class="stats" data-field="stats"><!-- via JS --></div>
          </section>
          <section class="card stack">
            <p class="skill-tab" style="margin-top:0">Retomar a campanha</p>
            <a class="btn btn--primary btn--block" href="zona-segura.html">Continuar</a>
            <a class="btn btn--muted btn--block" href="campanhas.html">Trocar de campanha</a>
          </section>
        </aside>
      </div>
    </main>
  </div>

  <script src="../scripts/mock-data.js"></script>
  <script>
    (function () {
      var id = SH.currentCampaignId();
      var c = SH.CAMPAIGNS[id];
      var statusLabel = { ativa: c.statusLabel, pausada: c.statusLabel };
      var statusClass = { ativa: "risk--elevado", pausada: "risk--mortal" };
      var kindLabel = { reconhecida: "Reconhecida", clandestina: "Clandestina", heretica: "Herética" };
      var outLabel  = { sucesso: "Sucesso", parcial: "Vitória parcial", fracasso: "Fracasso" };

      document.title = c.name + " · Sobrevivendo ao Horror";
      document.querySelector('[data-field="era"]').textContent = c.era;
      document.querySelector('[data-field="name"]').textContent = c.name;
      var st = document.querySelector('[data-field="status"]');
      st.textContent = c.statusLabel; st.className = "risk " + (statusClass[c.status] || "risk--elevado");
      document.querySelector('[data-field="synopsis"]').textContent = c.synopsis;

      document.querySelector('[data-field="crew"]').innerHTML = c.crew.map(function (m) {
        return '<article class="crew-card">' +
          '<div class="av">' + m.photo + '</div>' +
          '<div><p class="path">' + m.path + '</p>' +
            '<h4>' + m.name + '</h4>' +
            '<p>' + m.trait + '</p></div>' +
          '</article>';
      }).join("");

      document.querySelector('[data-field="orgs"]').innerHTML = c.orgs.map(function (o) {
        return '<div class="org">' +
          '<span class="kind kind--' + o.kind + '">' + (kindLabel[o.kind] || o.kind) + '</span>' +
          '<div><h4>' + o.name + '</h4><p>' + o.note + '</p></div>' +
          '</div>';
      }).join("");

      document.querySelector('[data-field="log"]').innerHTML = c.log.map(function (s) {
        return '<div class="tl-item">' +
          '<span class="tl-n">' + s.n + '</span>' +
          '<div class="tl-body"><h4>' + s.title + '</h4>' +
            '<p class="tl-meta"><span class="out--' + s.outcome + '">' + (outLabel[s.outcome] || s.outcome) + '</span>' +
            '<span class="date">' + s.date + '</span></p></div>' +
          '</div>';
      }).join("");

      document.querySelector('[data-field="stats"]').innerHTML =
        '<div class="stat"><span class="k">Sessões jogadas</span><span class="v">' + c.stats.sessoes + '</span></div>' +
        '<div class="stat"><span class="k">Casos encerrados</span><span class="v">' + c.stats.casos + '</span></div>' +
        '<div class="stat"><span class="k">Tempo na campanha</span><span class="v">' + c.stats.tempo + '</span></div>';
    })();
  </script>
  <script src="../scripts/navigation.js"></script>
  <script src="../scripts/interactions.js"></script>
</body>
</html>
